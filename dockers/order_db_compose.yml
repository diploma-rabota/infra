version: '3.9'

services:
  order-service-db:
    image: postgres:16
    container_name: order-service-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_service_db
      POSTGRES_USER: order_service_user
      POSTGRES_PASSWORD: order_service_password
    ports:
      - "5433:5432"
    volumes:
      - order_service_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user_service_user -d user_service_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  order_service_db_data: